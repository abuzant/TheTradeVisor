# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.thetradevisor.com;
    return 301 https://api.thetradevisor.com$request_uri;
}

# API subdomain - Redirect non-EA traffic to main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.thetradevisor.com;
    
    root /var/www/thetradevisor.com/public;
    index index.php;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/thetradevisor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thetradevisor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logging
    access_log /var/log/nginx/api-thetradevisor-access.log;
    error_log /var/log/nginx/api-thetradevisor-error.log;

    # Larger body size for data uploads
    client_max_body_size 10M;

    # Security headers (API-specific)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Tell search engines not to index this subdomain
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Drop bad probes immediately
    if ($is_badprobe) { return 444; }

    # Log only the flagged requests (makes fail2ban trivial)
    access_log /var/log/nginx/badprobes.log badprobes if=$is_badprobe;

    # Redirect obvious browser traffic at nginx level (before PHP)
    # GET requests to root or common paths should go to main site
    location = / {
        return 301 https://thetradevisor.com/;
    }
    
    location = /favicon.ico {
        return 301 https://thetradevisor.com/favicon.ico;
    }
    
    location = /robots.txt {
        alias /var/www/thetradevisor.com/public/robots-api.txt;
        add_header Content-Type text/plain;
    }
    
    # Redirect any GET request to non-API paths
    if ($request_method = GET) {
        set $redirect_to_main 1;
    }
    
    # But allow health check
    location = /api/health {
        set $redirect_to_main 0;
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Redirect if flag is set
    if ($redirect_to_main = 1) {
        return 301 https://thetradevisor.com$request_uri;
    }

    # Rate limiting for API endpoints
    location /api/v1/data/collect {
        limit_req zone=api burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # API routes - Laravel middleware will handle additional validation
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        
        # Increase timeouts for data processing
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
