version: '3.8'

services:
  # TheTradeVisor Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thetradevisor-app
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=thetradevisor
      - DB_USERNAME=thetradevisor
      - DB_PASSWORD=secure_password_123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - postgres
      - redis
    networks:
      - thetradevisor-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: thetradevisor-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=thetradevisor
      - POSTGRES_USER=thetradevisor
      - POSTGRES_PASSWORD=secure_password_123
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - thetradevisor-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: thetradevisor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - thetradevisor-network

  # Laravel Horizon (Queue Worker)
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thetradevisor-horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=thetradevisor
      - DB_USERNAME=thetradevisor
      - DB_PASSWORD=secure_password_123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - postgres
      - redis
    networks:
      - thetradevisor-network

  # Nginx (Optional - if you want separate nginx container)
  nginx:
    image: nginx:alpine
    container_name: thetradevisor-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx-separate.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - thetradevisor-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  thetradevisor-network:
    driver: bridge
