# Nginx configuration for join.thetradevisor.com (Affiliate Subdomain)
# This file should be symlinked to /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name join.thetradevisor.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name join.thetradevisor.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/join.thetradevisor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/join.thetradevisor.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/join.thetradevisor.com/chain.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Document Root
    root /var/www/thetradevisor.com/public;
    index index.php index.html;

    # Logging
    access_log /var/log/nginx/join.thetradevisor.com-access.log;
    error_log /var/log/nginx/join.thetradevisor.com-error.log;

    # Rate Limiting for Affiliate Clicks
    limit_req_zone $binary_remote_addr zone=affiliate_clicks:10m rate=10r/m;
    limit_req zone=affiliate_clicks burst=5 nodelay;

    # Main Location Block
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM Configuration
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
        
        # Timeouts
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        
        # Buffer sizes
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Static file caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Block access to vendor and storage
    location ~ /(vendor|storage|bootstrap/cache) {
        deny all;
        return 404;
    }
}
