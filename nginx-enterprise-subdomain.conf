# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name enterprise.thetradevisor.com;
    return 301 https://enterprise.thetradevisor.com$request_uri;
}

# Enterprise subdomain - Broker admin portal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name enterprise.thetradevisor.com;
    
    root /var/www/thetradevisor.com/public;
    index index.php index.html;

    # SSL Configuration (will be updated after certbot)
    ssl_certificate /etc/letsencrypt/live/thetradevisor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thetradevisor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logging
    access_log /var/log/nginx/enterprise-thetradevisor-access.log;
    error_log /var/log/nginx/enterprise-thetradevisor-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # HSTS (optional, but recommended for production)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Client body size
    client_max_body_size 10M;

    # Favicon and robots
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
    
    location = /robots.txt {
        access_log off;
        log_not_found off;
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Main location block
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        
        # Timeouts
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        
        # Buffer settings
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* \.(env|log|sql|sqlite|bak|backup)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Static file caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
